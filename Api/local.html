<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Socket.IO Timer Example</title> <script
      src="https://code.jquery.com/jquery-3.6.0.js"
      integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk="
      crossorigin="anonymous"
    ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>

</head>

<body>
  

  <button id="startBtn">Start Timer</button>
  <button id="connectBtn">Connect</button>
  <button id="disconnectBtn">Disconnect</button>

  <script>
       const socket = io();

    const startBtn = document.getElementById('startBtn');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');

    startBtn.addEventListener('click', () => {
      socket.emit('startTimer');
    });

    connectBtn.addEventListener('click', () => {
      socket.emit('connectSocket');
    });

    disconnectBtn.addEventListener('click', () => {
      socket.emit('disconnectSocket');
    });

    // Listen for timer events
    socket.on('timerEvent', (data) => {
       console.log(`Countdown: ${data.countdown}`);
    });

    // Listen for end event
    socket.on('endEvent', (data) => {
      console.log(data.message);
    });

    // Listen for start event and update UI
    socket.on('startEvent', (data) => {
      console.log(data.message);
      console.log(`Countdown: ${data.countdown}`);
    });
  </script>

  </script>
</body>

</html>
