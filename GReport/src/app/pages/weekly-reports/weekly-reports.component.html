<div class="container">
  <h2>Weekly Details Report</h2>
  <span class="remainLoan"></span>
  <!--row-->
  <div class="row">
    <div>


      <form action="/WeekllyDetails.mvc/WeekReport" method="post">
        <table style="width:100%;">
          <tbody>
            <tr>
              <td>
                <div class="row-left">
                  <label for="strFromDate">From Date :</label>
                  <span class="DatePicker_Icon_Wrapper"
                    style="display: inline-block; position: relative; float: none; inset: auto;">
                    <input type="date">
                  </span>
                </div>
                <div class="row-mid">
                  <label for="strEndDate">To Date :</label>
                  <span class="DatePicker_Icon_Wrapper"
                    style="display: inline-block; position: relative; float: none; inset: auto;">
                    <input type="date">
                  </span>
                </div>
                <div class="row-right">
                  <input type="button" name="btnSearch" id="btnSearch" value="Search">
                </div>
              </td>
            </tr>
            <tr>
              <td>&nbsp;</td>
            </tr>
            <tr>
              <td>
                <div class="row">
                  <app-accordian
                  [items]="items">

                  </app-accordian>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </form>

    </div>
  </div>
  <!--row end-->

  <!--bar-chart-->
  <div class="bar-chart">
    <img src="assets/img/login-bar-chart.png" alt="Bar Chart">
  </div>
  <!--bar-chart-->
</div>
