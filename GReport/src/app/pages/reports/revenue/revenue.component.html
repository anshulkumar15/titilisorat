<div class="container">
    <h2>Revenue</h2>
    <span class="remainLoan"></span>
    <!--row-->
    <div class="row">
        <div>

            <form action="/Reports.mvc" method="post">
                <table style="width:100%;">
                    <tbody>
                        <tr>
                            <td>
                                <div class="row-left">
                                    <label for="strFromDate">From Date : </label>
                                    <span class="DatePicker_Icon_Wrapper"
                                        style="display: inline-block; position: relative; float: none; inset: auto;">
                                        <input name="s_date" type="date" [(ngModel)]="options.s_date"
                                            >
                                    </span>
                                </div>
                                <div class="row-mid">
                                  <label for="strToDate">To Date : </label>

                                  <span class="DatePicker_Icon_Wrapper"
                                      style="display: inline-block; position: relative; float: none; inset: auto;">
                                      <input name="e_date" type="date" [(ngModel)]="options.e_date">

                                  </span>
                              </div>


                                <!-- <div class="row-mid">
                                  <label for="MemberID">Member ID </label>
                                  <input name="search" class="search-input" #searchBox id="search-box" placeholder=""
                                      [(ngModel)]="options.search" (input)="search(searchBox.value)" />
                                  <select name="type" id="" [(ngModel)]="options.type" class="form-select">
                                    <option value="">All</option>
                                    <option value="send">Withdraw</option>
                                    <option value="receive">Deopsit</option>
                                  </select>
                              </div> -->
                                <div class="row-right show-details-button">
                                    <input type="button" name="btnShowDetails" id="btnShowDetails" value="Show Details"
                                        (click)="getData()">
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td>
                            </td>
                        </tr>

                        <tr>
                            <td>
                                <div class="grid" id="dvRevenue">
                                    <table style="width:100%;">
                                        <thead>
                                            <tr>
                                                <th>Sr. No.</th>
                                                <th>User </th>
                                                <th>Profit</th>
                                                <th>Date</th>

                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr *ngFor="let item of tableRows | 
                                            paginate: { itemsPerPage: options.size, currentPage: options.page, totalItems: options.totalRecords };
                                            index as i;">
                                                <!-- {{ options |json }} -->
                                                <td> {{i+1}} </td>
                                                <td>{{item.agent}}</td>
                                                <td [style.color]="item.profit <0 ? 'red' : 'green'">{{item.profit
                                                    |number}}</td>
                                                <td>{{item.date |date}}</td>
                                                <!-- <td>
                                              <a class="btn btn btn-primary me-2" href="/admin/users/manage/{{item.id}}">Edit</a>
                                              <button class="btn btn btn-danger" (click)="confirm(item.id)">Delete</button>
                                
                                            </td> -->
                                            </tr>
                                            <tr *ngIf="tableRows.length===0">
                                                <th> </th>
                                                <th>Record Not Found</th>
                                                <th></th>
                                            </tr>

                                        </tbody>
                                        <tfoot>
                                            <tr  >

                                                <td></td>
                                                <td>Total :</td>


                                                <td [style.color]="totalProfit <0 ? 'red' : 'green'"> {{totalAmount}}
                                                </td>
                                                <td> </td>
                                            </tr>
                                        </tfoot>
                                    </table>
                                    <div class="pagination-div">

                                        <div class="dataTables_info mb-2" id="tickets-table_info" role="status"
                                            aria-live="polite">
                                            Size: <select class="form-dropdown" name="nights" [ngModel]="options.size"
                                                (change)="pageSizeChange($event)" required>

                                                <option [value]="n" *ngFor="let n of pageArr index as i">{{n}}</option>
                                            </select>
                                            Showing
                                            {{options.startIndex}} to
                                            {{options.endIndex}} of {{options.totalRecords}}
                                            entries
                                        </div>


                                        <div class="clearfix">
                                            <pagination-controls previousLabel="" nextLabel=""
                                                (pageChange)="pageChange($event)"></pagination-controls>


                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>

            </form>

        </div>
    </div>

    
    <!-- <app-dialog *ngIf="isDialogOpen" [title]="dialogTitle"
        [message]="dialogMessage" (closeDialog)="closeDialog()">
    </app-dialog> -->
    <!--row end-->

    <!--bar-chart-->
    <div class="bar-chart">
        <img src="assets/img/login-bar-chart.png" alt="Bar Chart">
    </div>
    <!--bar-chart-->
</div>
