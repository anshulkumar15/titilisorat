<div class="container">
    <h2>Multiplayer Point Transfer</h2>
    <span class="remainLoan"></span>
    <!--row-->
    <div class="row">
        <div>


            <form action="/PKReports.mvc" method="post">
                <table style="width:100%;">
                    <tbody>
                        <tr>
                            <td>
                                <div class="row-left">
                                    <label for="strFromDate">From Date : </label>
                                    <span class="DatePicker_Icon_Wrapper"
                                    style="display: inline-block; position: relative; float: none; inset: auto;">
                                   <input type="date">
                                </span>
                                </div>
                                <div class="row-mid">
                                    <label for="strToDate">To Date : </label>
                                    <span class="DatePicker_Icon_Wrapper"
                                    style="display: inline-block; position: relative; float: none; inset: auto;">
                                   <input type="date">
                                </span>
                                </div>
                                <div class="row-mid">
                                    <label for="MemberID">Member ID </label>
                                    <input class="" data-val="true"
                                        data-val-regex="The field Member ID  must match the regular expression '^GK[0-9]{8}$'."
                                        data-val-regex-pattern="^GK[0-9]{8}$" id="txtMemberID" name="MemberID"
                                        type="text" value="">
                                </div>
                                <div class="row-right show-details-button">
                                    <input type="button" name="btnShowDetails" id="btnShowDetails" value="Show Details">
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td>
                            </td>
                        </tr>
                        <tr>
                            <td>&nbsp;</td>
                        </tr>
                        <tr>
                            <td>
                                <div class="row">
                                    <app-accordian
                                    [items]="items">

                                    </app-accordian>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
               
            </form>

        </div>
    </div>
    <!--row end-->

    <!--bar-chart-->
    <div class="bar-chart">
        <img src="assets/img/login-bar-chart.png" alt="Bar Chart">
    </div>
    <!--bar-chart-->
</div>
