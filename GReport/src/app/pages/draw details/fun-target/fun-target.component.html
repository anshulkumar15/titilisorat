                                            </tr>
                                        </thead>

                                            <tr *ngFor="let item of tableRows | 
                                              paginate: { itemsPerPage: options.size, currentPage: options.page, totalItems: options.totalRecords };

                                                <!-- {{ options |json }} -->
                                                <td> {{i+1}} </td>
                                                <td>{{item.RoundCount}}</td>

                                              </td> -->

                                                <th> </th>

                                                <th></th>
                                                <th></th>
                                            </tr>
                        
                                        </tbody>

                                                <td>{{item.profit}}</td>
                                                <td></td>
                                               
                                            </tr>
                                        </tfoot>
                                    </table>

                                                (change)="pageSizeChange($event)" required>
                            
                                                <option [value]="n" *ngFor="let n of pageArr index as i">{{n}}</option>
                                            </select>
                                            Showing
                                            {{options.startIndex}} to
                                            {{options.endIndex}} of {{options.totalRecords}}

                                        </div>
                            
                            
                                        <div class="clearfix">
