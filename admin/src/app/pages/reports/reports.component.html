<main class="mt-2">

    <section>
        <div class="flex">

            <h5>Reports</h5>
            <div class="flex">
                 <!--  <div>
                 <select class="form-select" [(ngModel)]="report_name" (change)="navigate()">
                        <option value="/admin/reports">transfer-records</option>
                       <option value="/admin/reports/transaction-history">transaction-history</option>
                      <option value="/admin/reports/game-report">win-report</option>
                      <option value="/admin/reports/point-received">point-received</option>
                      <option value="/admin/reports/point-rejected">point-rejected</option>
                      <option value="/admin/reports/point-cancled">point-cancle</option>
          
                    </select>
                  </div> -->
                  <div><input class="search-input" name="s_date" type="date" [(ngModel)]="options.s_date"
                    (ngModelChange)="sdateChanged($event)"></div>
                <div> - </div>
                <div class="mr-1">
        
                  <input class="search-input" name="e_date" type="date" [(ngModel)]="options.e_date">
                </div>
        
        
                <div class="search-container">
                  <input class="search-input" #searchBox id="search-box" placeholder="" (input)="search(searchBox.value)" />
                  <i class="fas fa-search search-icon"></i>
                </div>
                <div>
                    <select name="type" id="" [(ngModel)]="options.type"  class="form-select">
                        <option value="">All</option>
                        <option value="send">Send</option>
                        <option value="receive">Recive</option>
                    </select>
                </div>
                <!-- <div class="search-container">
                     <input class="search-input" #searchBox id="search-box" placeholder="" (input)="search(searchBox.value)" />
                    <i class="fas fa-search search-icon"></i>
                </div> -->
            </div>
        </div>

        <div class="scroll">
            <table class="table mt-4">
                <thead>
                    <tr>
                        <th scope="col">S.No</th>
                        
                       
                        <th scope="col">Sender</th>
                        <th scope="col">Reciver </th> <th scope="col">Point</th>
                        <th scope="col">Dated</th>

                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let item of tableRows | 
                      paginate: { itemsPerPage: options.size, currentPage: options.page, totalItems: options.totalRecords }
                       ">
                        <!-- {{ options |json }} -->
                        <td> <input type="checkbox" value="{{item.id}}" [checked]="showChecked(item)"
                                (click)="selectItem($event, item)"></td>
                                <td>{{item.FromAccountName}}</td>

                        <td>{{item.ToAccountName}}</td>
                        
                        <td>{{item.point |number}}</td>
                        <td>{{item.Date |date}}</td>
                         
                    


                        <!-- <td>
          
                        <a class="btn btn btn-primary me-2" href="/admin/users/manage/{{item.id}}">Edit</a>
                        <button class="btn btn btn-danger" (click)="confirm(item.id)">Delete</button>
          
                      </td> -->
                    </tr>
                    <tr *ngIf="tableRows.length===0">
                        <th> </th>
                        <th></th>
                        <th>Record Not Found</th>
                        <th></th>
                        <th></th>
                    </tr>

                </tbody>


            </table>
        </div>



        <div class="pagination-div">

            <div class="dataTables_info mb-2" id="tickets-table_info" role="status" aria-live="polite">
                Size: <select class="form-dropdown" name="nights" [ngModel]="options.size"
                    (change)="pageSizeChange($event)" required>

                    <option [value]="n" *ngFor="let n of pageArr index as i">{{n}}</option>
                </select>
                Showing
                {{options.startIndex}} to
                {{options.endIndex}} of {{options.totalRecords}}
                entries
            </div>


            <div class="clearfix">
                <pagination-controls previousLabel="" nextLabel=""
                    (pageChange)="pageChange($event)"></pagination-controls>


            </div>
        </div>

    </section>
</main>
