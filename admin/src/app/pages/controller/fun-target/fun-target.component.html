<main class="mt-2">

    <section>
      <div class="flex">
  
        <h5>Game controller</h5>
        <div class="flex justify-content-between">
          <div class="p-2">
            Timer: <strong>{{countdowns.countdown }}</strong>
          </div>
          <div>
            <select class="form-select" [(ngModel)]="game"  (change)="navigate()">
              <!-- <option value="1">TripleChanceGame</option> -->
              <!-- <option value="2">Roullet Game</option>
              <option value="3">FunTarget Game</option> -->
              <option value="3" selected>Sorat Game</option>
  
            </select>
          </div>
        </div>
      </div>
      <div class="mt-4">
        <h2>Titli Sorat Game</h2>
          <!-- <h2>FunTarget Game</h2> -->
        <h3>Result : {{resultCurent}}</h3>
        <table class="table">
          <thead>
            <tr>
              <th>Single</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <span>{{funtargetAdmin.selectedOption}}</span>
              <span *ngIf="funtargetAdmin.selectedOption === 'target_amount'"> = {{funtargetAdmin.targetAmount}} from {{funtargetAdmin.startDate}} to {{funtargetAdmin.endDate}}  </span>
            </tr>
          </tbody>
        </table>
        <h3>Current Bet</h3>
        <div class="d-flex flex-wrap">
          <div class="text-center height" *ngFor="let key of getObjectKeys(funtargetResult); let i = index">
            <div class="box" [ngClass]="{'box1': 0}">
              {{key}}
            </div>{{funtargetResult[key]}}
          </div>
  
        </div>
        <div class="flex justify-content-between">
          Set Manual Result:
         
          <div class="win-type-selector">
            <label>Select Win Type:</label>
            <select [(ngModel)]="selectedWinType" (change)="onWinTypeChange()">
              <option *ngFor="let type of winTypes" [value]="type">{{ type }}</option>
            </select>
          </div>
          <!-- Show only when "Selected Option Win" is selected -->
          <div *ngIf="selectedWinType === 'Selected Option Win'" class="option-selector">
            <label>Select Option (0 to 11):</label>
            <select [(ngModel)]="selectedOption">
              <option *ngFor="let opt of optionRange" [value]="opt">{{ opt }}</option>
            </select>
          </div>

           <div *ngIf="selectedWinType === 'Target Amount'" class="option-selector">

             <!-- Date Range Selector -->
          <div class="date-range">
            <label>Start Date:</label>
            <input type="date" [(ngModel)]="startDate" class="form-control" />

            <label class="ml-3">End Date:</label>
            <input type="date" [(ngModel)]="endDate" class="form-control" />
          </div>

            <!-- Target Amount Input -->
              <div class="target-amount">
                <label>Target Amount:</label>
                <input type="number" [(ngModel)]="targetAmount" placeholder="Enter target amount" />
              </div>
            

           </div>


          <div>
            <button class="btnn1 " (click)="saveFunTarget()">Save</button>
            <!-- <button class="btnn1 ml-2"  (click)="delFunTarget()">Delete</button> -->
          </div>
        </div>
        <!-- <div class="d-flex flex-wrap">
          <div class="text-center height" *ngFor="let item of boxes; let i = index">
            <div class="box" [ngClass]="{'box1': item}">
              {{i+1}}
            </div>
           </div>
  
        </div>
          -->
      </div>
  
  
    </section>
  </main>
