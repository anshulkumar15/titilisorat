<main class="mt-2">

  <section>
    <div class="flex">

      <h5>Game controller</h5>
      <div class="flex justify-content-between">
        <div class="p-2">
          Timer: <strong>00:59</strong>
        </div>
        <div>
          <select class="form-select" [(ngModel)]="game" (change)="navigate()">
            <!-- <option value="1">TripleChanceGame</option>
            <option value="2">Roullet Game</option> -->
            <option value="3" selected>Sorat Game</option>

          </select>
        </div>
      </div>
    </div>


    <div class="mt-4">
      <h1>TripleChanceGame</h1>

      <h2>Result</h2>
      <table class="table">
        <thead>
          <tr>
            <th>Single</th>
            <th>Double</th>
            <th>Triple</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>{{triplechanceAdamin?.value1}}</td>
            <td>{{triplechanceAdamin?.value2}}</td>
            <td>{{triplechanceAdamin?.value3}}</td>
          </tr>

        </tbody>
      </table>
      <h2>Current Bet</h2>
      <table class="table">
        <thead>
          <tr>
            <th>Single</th>
            <th>Double</th>
            <th>Triple</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of tripleCurrent">
            <td>{{item.singleNo}}</td>
            <td>{{item.doubleNo}}</td>
            <td>{{item.tripleNo}}</td>
          </tr>

        </tbody>
      </table>
      <div>Single Win</div>
      <div class="d-flex flex-wrap">
        <!-- <div class="text-center height" *ngFor="let item of boxes; let i = index">
          <div class="box" [ngClass]="{'box1': tripleui.single ===i}" (click)="single(i)">
            {{i}}
          </div>
         </div> -->
        <select class="form-select" [(ngModel)]="tripleui.single">
          <option value="">SetResult</option>
          <option [value]="item" *ngFor="let item of boxes;">{{item}}</option>

        </select>

      </div>
      <div>Double Win</div>
      <div class="d-flex flex-wrap">
        <!-- <div class="text-center height" *ngFor="let item of boxes; let i = index" (click)="double(i)">
          <div class="box" [ngClass]="{'box1': tripleui.double ===i}">
            {{i}}
          </div>
         </div> -->
        <select class="form-select" [(ngModel)]="tripleui.double">
          <option value="">SetResult</option>
          <option [value]="item" *ngFor="let item of boxes;">{{item}}</option>

        </select>
      </div>
      <div>Triple Win</div>
      <div class="d-flex flex-wrap">
        <!-- <div class="text-center height" *ngFor="let item of boxes; let i = index"  (click)="triple(i)">
          <div class="box" [ngClass]="{'box1': tripleui.triple === i}">
            {{i}}
          </div>
         </div> -->
        <select class="form-select" [(ngModel)]="tripleui.triple">
          <option value="">SetResult</option>
          <option [value]="item" *ngFor="let item of boxes;">{{item}}</option>

        </select>
      </div>
      <div class="flex ">
        <button class="btnn1 " (click)="saveTripleChance()">Save</button><button class="btnn1 ml-2"
          (click)="delTripleChance()">Delete</button>
      </div>


    </div>


  </section>
</main>
