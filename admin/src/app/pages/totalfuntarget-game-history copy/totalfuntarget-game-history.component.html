<main class="mt-2">
  <section>
    <div class="flex justify-between items-center mb-4">
      <h5 class="font-semibold text-lg">Player History</h5>
      
      <div class="flex items-center gap-3">
        <!-- Search Input -->
        <!-- <div class="search-container">
          <input 
            class="search-input" 
            #searchBox 
            id="search-box" 
            placeholder="Search players..."
            (input)="search(searchBox.value)" 
            [value]="options.search" />
          <i class="fas fa-search search-icon" title="Search"></i>
        </div> -->

        <!-- Report Selection -->
        <div>
          <select 
            class="form-select" 
            name="report_name" 
            [(ngModel)]="report_name" 
            (change)="navigate()"
            title="Select Report">
            <option value="/admin/history/funtarget">FunTarget</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Loading Indicator -->
    <div *ngIf="isLoading" class="text-center py-4">
      <div class="spinner-border text-primary" role="status">
        <span class="sr-only">Loading...</span>
      </div>
    </div>

    <!-- Data Table -->
    <div class="scroll" *ngIf="!isLoading">
      <table class="table table-striped table-hover mt-4">
        <thead class="table-dark">
          <tr>
          
            <th scope="col">S.No</th>
            <th scope="col">Username</th>
            <th scope="col">Total Bet</th>
            <th scope="col">Total Win</th>
            <!-- <th scope="col">Actions</th> -->
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of tableRows; let i = index" 
              [class.table-active]="showChecked(item)">
           
            <td>{{ (options.page - 1) * options.size + i + 1 }}</td>
            <td>
              <strong>{{ item.playername }}</strong>
            </td>
            <td>
              <span class="text-danger fw-bold">{{ item.betpoint | currency:'₹' }}</span>
            </td>
            <td>
              <span class="text-success fw-bold">{{ item.winpoint | currency:'₹' }}</span>
            </td>
            <!-- <td>
              <button 
                class="btn btn-sm btn-outline-danger" 
                (click)="confirm(item._id)"
                title="Delete Record">
                <i class="fas fa-trash"></i>
              </button>
            </td> -->
          </tr>
          
          <tr *ngIf="tableRows.length === 0 && !isLoading">
            <td colspan="6" class="text-center py-4">
              <div class="text-muted">
                <i class="fas fa-inbox fa-2x mb-2"></i>
                <p>No records found</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination Section -->
    <!-- <div class="pagination-div mt-4" *ngIf="!isLoading && tableRows.length > 0">
     
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="dataTables_info">
          <span class="me-2">Size:</span>
          <select 
            class="form-select form-select-sm d-inline-block w-auto" 
            [(ngModel)]="options.size" 
            (change)="pageSizeChange($event)">
            <option *ngFor="let n of pageArr" [value]="n">{{ n }}</option>
          </select>
          <span class="ms-3">
            Showing {{ options.startIndex }} to {{ options.endIndex }} of {{ options.totalRecords }} entries
          </span>
        </div>

       
        <div *ngIf="checkboxes.length > 0" class="selected-actions">
          <span class="badge bg-primary me-2">{{ checkboxes.length }} selected</span>
          <button class="btn btn-sm btn-outline-danger" 
                  title="Delete Selected Items">
            <i class="fas fa-trash me-1"></i>Delete Selected
          </button>
        </div>
      </div>

    </div> -->
  </section>
</main>
